  enabled: "✅ เปิดใช้งานระบบขุดแร่สายในโลก {world} สำเร็จ"
  
  # ข้อความปิดใช้งานสำเร็จ
  disabled: "❌ ปิดใช้งานระบบขุดแร่สายในโลก {world} สำเร็จ"
  
  # ข้อความรีโหลด config
